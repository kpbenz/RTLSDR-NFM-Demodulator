<svg width="560" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <style>
    .box-blue  { fill:#E6F1FB; stroke:#378ADD; }
    .box-teal  { fill:#E1F5EE; stroke:#1D9E75; }
    .box-purp  { fill:#EEEDFE; stroke:#7F77DD; }
    .box-coral { fill:#FAECE7; stroke:#D85A30; }
    .th { font-size:14px; font-weight:600; fill:#0C447C; }
    .th-teal  { font-size:14px; font-weight:600; fill:#085041; }
    .th-purp  { font-size:14px; font-weight:600; fill:#3C3489; }
    .th-coral { font-size:14px; font-weight:600; fill:#712B13; }
    .ts  { font-size:12px; font-weight:400; fill:#185FA5; }
    .ts-teal  { font-size:12px; font-weight:400; fill:#0F6E56; }
    .ts-purp  { font-size:12px; font-weight:400; fill:#534AB7; }
    .ts-coral { font-size:12px; font-weight:400; fill:#993C1D; }
    .lbl { font-size:11px; fill:#000000; }
    .bracket { stroke:#000080; stroke-width:0.6; fill:none; }
    .arr { stroke:#000000; stroke-width:1.4; fill:none; }
  </style>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Stage 1 -->
<rect class="box-blue" x="200" y="60" width="280" height="56" rx="8" stroke-width="0.7"/>
<text class="th"  x="340" y="77"  text-anchor="middle" dominant-baseline="central">1 · IQ capture</text>
<text class="ts"  x="340" y="99"  text-anchor="middle" dominant-baseline="central">rtl_sdr at 280 kHz sample rate</text>

<line class="arr" x1="340" y1="116" x2="340" y2="136" marker-end="url(#arrow)"/>

<!-- Stage 2 -->
<rect class="box-blue" x="200" y="140" width="280" height="56" rx="8" stroke-width="0.7"/>
<text class="th"  x="340" y="157" text-anchor="middle" dominant-baseline="central">2 · Load IQ file</text>
<text class="ts"  x="340" y="179" text-anchor="middle" dominant-baseline="central">uint8 offset-binary &#x2192; complex64</text>

<line class="arr" x1="340" y1="196" x2="340" y2="216" marker-end="url(#arrow)"/>

<!-- Stage 3 -->
<rect class="box-teal" x="200" y="220" width="280" height="56" rx="8" stroke-width="0.7"/>
<text class="th-teal"  x="340" y="237" text-anchor="middle" dominant-baseline="central">3 · Frequency shift</text>
<text class="ts-teal"  x="340" y="259" text-anchor="middle" dominant-baseline="central">mix down +30 kHz to baseband</text>

<line class="arr" x1="340" y1="276" x2="340" y2="296" marker-end="url(#arrow)"/>

<!-- Stage 4 -->
<rect class="box-teal" x="200" y="300" width="280" height="56" rx="8" stroke-width="0.7"/>
<text class="th-teal"  x="340" y="317" text-anchor="middle" dominant-baseline="central">4 · IF bandpass filter</text>
<text class="ts-teal"  x="340" y="339" text-anchor="middle" dominant-baseline="central">128-tap FIR, 8.5 kHz bandwidth</text>

<line class="arr" x1="340" y1="356" x2="340" y2="376" marker-end="url(#arrow)"/>

<!-- Stage 5 -->
<rect class="box-teal" x="200" y="380" width="280" height="56" rx="8" stroke-width="0.7"/>
<text class="th-teal"  x="340" y="397" text-anchor="middle" dominant-baseline="central">5 · FM discrimination</text>
<text class="ts-teal"  x="340" y="419" text-anchor="middle" dominant-baseline="central">instantaneous phase derivative</text>

<line class="arr" x1="340" y1="436" x2="340" y2="456" marker-end="url(#arrow)"/>

<!-- Stage 6 -->
<rect class="box-purp" x="200" y="460" width="280" height="56" rx="8" stroke-width="0.7"/>
<text class="th-purp"  x="340" y="477" text-anchor="middle" dominant-baseline="central">6 · Audio low-pass filter</text>
<text class="ts-purp"  x="340" y="499" text-anchor="middle" dominant-baseline="central">256-tap FIR, 3400 Hz cutoff</text>

<line class="arr" x1="340" y1="516" x2="340" y2="536" marker-end="url(#arrow)"/>

<!-- Stage 7 -->
<rect class="box-purp" x="200" y="540" width="280" height="56" rx="8" stroke-width="0.7"/>
<text class="th-purp"  x="340" y="557" text-anchor="middle" dominant-baseline="central">7 · Decimation &#xF7;5</text>
<text class="ts-purp"  x="340" y="579" text-anchor="middle" dominant-baseline="central">280 kHz &#x2192; 56 kHz audio rate</text>

<line class="arr" x1="340" y1="596" x2="340" y2="616" marker-end="url(#arrow)"/>

<!-- Stage 8 -->
<rect class="box-coral" x="200" y="620" width="280" height="56" rx="8" stroke-width="0.7"/>
<text class="th-coral" x="340" y="637" text-anchor="middle" dominant-baseline="central">8 · Squelch &amp; output</text>
<text class="ts-coral" x="340" y="659" text-anchor="middle" dominant-baseline="central">&#x2212;30 dBFS gate, normalise, WAV</text>

<!-- Left brackets -->
<line class="bracket" x1="195" y1="88"  x2="190" y2="88"/>
<line class="bracket" x1="190" y1="88"  x2="190" y2="168"/>
<line class="bracket" x1="190" y1="168" x2="195" y2="168"/>
<text class="lbl" x="185" y="130" text-anchor="end">input</text>

<line class="bracket" x1="195" y1="248" x2="190" y2="248"/>
<line class="bracket" x1="190" y1="248" x2="190" y2="408"/>
<line class="bracket" x1="190" y1="408" x2="195" y2="408"/>
<text class="lbl" x="185" y="330" text-anchor="end">RF</text>

<line class="bracket" x1="195" y1="488" x2="190" y2="488"/>
<line class="bracket" x1="190" y1="488" x2="190" y2="568"/>
<line class="bracket" x1="190" y1="568" x2="195" y2="568"/>
<text class="lbl" x="185" y="530" text-anchor="end">audio</text>

<!-- Legend -->
<rect class="box-blue"  x="490" y="318" width="12" height="12" rx="2" stroke-width="0.6"/>
<text class="lbl" x="508" y="328">Data input</text>
<rect class="box-teal"  x="490" y="338" width="12" height="12" rx="2" stroke-width="0.6"/>
<text class="lbl" x="508" y="348">RF processing</text>
<rect class="box-purp"  x="490" y="358" width="12" height="12" rx="2" stroke-width="0.6"/>
<text class="lbl" x="508" y="368">Audio processing</text>
<rect class="box-coral" x="490" y="378" width="12" height="12" rx="2" stroke-width="0.6"/>
<text class="lbl" x="508" y="388">Output</text>
</svg>
